<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MailFlow-agent</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <header>
    <div class="brand">
      <span class="logo" aria-hidden="true">✦</span>
      <div class="brand-info">
        <span class="title">MailFlow</span>
        <span class="tagline">AI Email Assistant</span>
      </div>
    </div>
    <button class="icon-btn" id="settingsBtn" aria-label="Open settings" title="Settings">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83 0 2 2 0 010-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/>
      </svg>
    </button>
  </header>

  <!-- Auth -->
  <section class="auth" id="authSection">
    <div class="auth-icon" aria-hidden="true">✉</div>
    <p class="auth-text">Connect your Gmail account to let AI manage your emails.</p>
    <button class="btn primary" id="authBtn">Sign in with Google</button>
  </section>

  <!-- Connected -->
  <section class="connected" id="actionsGrid" hidden>
    <div class="status-row">
      <span class="dot" id="connectionDot" role="status" aria-label="Not connected"></span>
      <span class="status-label" id="statusText">Connected</span>
      <span class="email" id="userEmail" hidden></span>
    </div>

    <div class="stats" id="statsSection">
      <div class="stat" style="--i: 0">
        <span class="stat-icon" aria-hidden="true">📬</span>
        <span class="stat-val" id="unreadCount">—</span>
        <span class="stat-lbl">Unread</span>
      </div>
      <div class="stat" style="--i: 1">
        <span class="stat-icon" aria-hidden="true">⏳</span>
        <span class="stat-val" id="pendingCount">—</span>
        <span class="stat-lbl">Pending</span>
      </div>
    </div>

    <div class="actions">
      <button class="action-btn" id="btnSummarize" style="--i: 0">
        <span class="action-icon" aria-hidden="true">📝</span>
        <span class="action-label">Summarize Inbox</span>
        <span class="action-arrow" aria-hidden="true">›</span>
      </button>
      <button class="action-btn" id="btnPriority" style="--i: 1">
        <span class="action-icon" aria-hidden="true">⚡</span>
        <span class="action-label">Priority Emails</span>
        <span class="action-arrow" aria-hidden="true">›</span>
      </button>
      <button class="action-btn accent" id="btnOpenPanel" style="--i: 2">
        <span class="action-icon" aria-hidden="true">◫</span>
        <span class="action-label">Open Side Panel</span>
        <span class="action-arrow" aria-hidden="true">›</span>
      </button>
    </div>
  </section>

  <footer>
    <a href="#" id="optionsLink">Settings</a>
    <span class="sep" aria-hidden="true">·</span>
    <span>Powered by <strong>Gemini</strong></span>
  </footer>

  <script type="module" src="popup.ts"></script>
</body>
</html>
